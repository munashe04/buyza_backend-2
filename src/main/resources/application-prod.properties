# Production Configuration

# Server
server.port=8080

# WhatsApp
whatsapp.api.url=https://graph.facebook.com/v22.0
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.signature.check=true
whatsapp.appSecret=${WHATSAPP_APP_SECRET}

# Google Sheets
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_ID}
google.sheets.enabled=true

# Logging
logging.level.com.munashe04.Buyza=INFO
logging.level.org.springframework.web=WARN

# Security
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized