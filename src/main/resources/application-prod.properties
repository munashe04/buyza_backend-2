# Production Configuration

# Server
server.port=8080

# WhatsApp
whatsapp.api.url=https://graph.facebook.com/v22.0
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.signature.check=true
whatsapp.appSecret=${WHATSAPP_APP_SECRET}

# Google Sheets
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_ID}
google.sheets.enabled=true



spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Async executor
async.executor.core-pool-size=10
async.executor.max-pool-size=50
async.executor.queue-capacity=1000
async.executor.thread-name-prefix=webhook-

# Logging
logging.level.com.munashe04.Buyza=INFO
logging.level.org.springframework.web=WARN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

en-authorized