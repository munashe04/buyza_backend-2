spring.application.name=Buyza
whatsapp.api.url=https://graph.facebook.com/v22.0
whatsapp.signature.check=false
# Disable JPA locally if no DB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Async
async.executor.core-pool-size=10
async.executor.max-pool-size=50
async.executor.queue-capacity=1000
async.executor.thread-name-prefix=webhook-

# Logging
logging.level.com.munashe04.Buyza=INFO
logging.level.org.springframework.web=WARN
