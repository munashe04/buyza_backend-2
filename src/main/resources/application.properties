spring.application.name=Buyza
whatsapp.api.url=https://graph.facebook.com/v19.0
whatsapp.signature.check=false

#buyza-bot-test@buyza-test.iam.gserviceaccount.com

max-pool-size: 50
queue-capacity: 1000
thread-name-prefix: "webhook-"

# JPA / DB (use H2 in dev; switch to PostgreSQL in prod)
#spring.datasource.url=jdbc:postgresql://localhost:5432/buyza
#spring.datasource.username=postgres
#spring.datasource.password=password
#spring.jpa.hibernate.ddl-auto=update

async.executor.core-pool-size: 10
async.executor.max-pool-size: 50
async.executor.queue-capacity: 1000
async.executor.thread-name-prefix: "webhook-"



logging.level.com.munashe04.Buyza=INFO
logging.level.org.springframework.web=WARN
logging.file.name=/app/logs/buyza-bot.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Security (important for production)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized



